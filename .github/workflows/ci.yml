name: CI/CD Pipeline for sammet

on:
  push:
    branches:
      - master
      - main

jobs:
  test:
    name: Run tests in built image
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kubsu -d kubsu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sammet-app:ci .

      - name: Run tests inside container
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@127.0.0.1:5432/kubsu \
            -v ${{ github.workspace }}/tests:/app/tests \
            sammet-app:ci \
            sh -c "pip install '.[test]' && python -m pytest tests -v"

  deploy:
    name: Deploy to server
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image with Podman
        run: podman build -t localhost/sammet-app:latest .

      - name: Stop and remove old application container
        run: |
          podman rm -f sammet-app 2>/dev/null || true

      - name: Start application container
        run: |
          podman run -d \
            --name sammet-app \
            --network host \
            --restart unless-stopped \
            -e DATABASE_URL=postgresql+asyncpg://kubsu:kubsu@127.0.0.1:5432/kubsu \
            localhost/sammet-app:latest

      - name: Verify container is running
        run: |
          sleep 3
          podman ps --filter "name=sammet-app" --format "table {{.Names}}\t{{.Status}}"
          podman logs --tail 20 sammet-app